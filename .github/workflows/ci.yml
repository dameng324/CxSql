name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: ./global.json

      - name: Restore tools
        run: dotnet tool restore

      - name: Check formatting
        run: dotnet tool run csharpier -- check .

      - name: Restore
        run: dotnet restore cxsql.slnx

      - name: Build
        run: dotnet build cxsql.slnx --no-restore

      - name: Test
        run: dotnet test cxsql.slnx --no-build
